<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon District Fighter</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
  canvas{display:block}
</style>

<body>
<canvas id="game" width="960" height="540"></canvas>
<script>
'use strict';

// ══════════════════════════════════════
//  LOCAL PERSISTENCE (localStorage)
// ══════════════════════════════════════
// Standalone build — no backend required. All progress lives in the
// browser's localStorage under the keys below. To wipe progress, the
// player can clear site data or use the RESET button on the title screen.
const LS_PROFILE='ndf.profile.v1';
const LS_CAMPAIGN='ndf.campaign.v1';
const LS_NAME='ndf.name.v1';

function lsLoad(key,fallback){
  try{const s=localStorage.getItem(key);return s?JSON.parse(s):fallback}
  catch(e){return fallback}
}
function lsSave(key,val){
  try{localStorage.setItem(key,JSON.stringify(val))}catch(e){}
}

// currentUser is kept as a non-null sentinel so existing UI gating
// (`if(currentUser&&playerProfile)`) still works without auth.
let currentUser={uid:'local',displayName:lsLoad(LS_NAME,null)||'Player'};
let playerProfile=null;

const DEFAULT_TALENTS={hp:0,damage:0,speed:0,special:0,defense:0};
const ALL_CHAR_IDS=['kai','vex','raze','ghost','kira','titan'];
// Unlock requirements: {charId: {type:'wins'|'campaign', value:N}}
const UNLOCK_REQS={kai:null,vex:null,raze:{type:'wins',value:5,desc:'Win 5 matches'},ghost:{type:'wins',value:10,desc:'Win 10 matches'},kira:{type:'campaign',value:8,desc:'Clear Campaign Ch2'},titan:{type:'campaign',value:16,desc:'Clear Campaign Ch4'}};

function defaultProfile(name){
  const chars={};
  for(const c of ALL_CHAR_IDS)chars[c]={...DEFAULT_TALENTS};
  return{displayName:name||'Player',totalWins:0,talentPoints:0,winStreak:0,bestStreak:0,survivalBest:0,characters:chars,
    dailyChallenges:{date:'',completed:[],claimed:false}};
}

function isCharUnlocked(cid){
  const req=UNLOCK_REQS[cid];
  if(!req)return true;// kai and vex always unlocked
  if(!playerProfile)return false;
  if(req.type==='wins')return(playerProfile.totalWins||0)>=req.value;
  if(req.type==='campaign'){
    // Check if any character has cleared enough campaign stages
    if(!campProgress)return false;
    for(const c of ALL_CHAR_IDS)if((campProgress[c]||0)>=req.value)return true;
    return false;
  }
  return false;
}

// ─── Daily Challenges ───
function getTodayStr(){return new Date().toISOString().slice(0,10)}
const CHALLENGE_POOL=[
  {id:'win_kai',desc:'Win a match with KAI',check:cid=>cid==='kai'},
  {id:'win_vex',desc:'Win a match with VEX',check:cid=>cid==='vex'},
  {id:'win_raze',desc:'Win a match with RAZE',check:cid=>cid==='raze'},
  {id:'win_ghost',desc:'Win a match with GHOST',check:cid=>cid==='ghost'},
  {id:'win_kira',desc:'Win a match with KIRA',check:cid=>cid==='kira'},
  {id:'win_titan',desc:'Win a match with TITAN',check:cid=>cid==='titan'},
  {id:'win3',desc:'Win 3 matches today',check:()=>true,count:3},
  {id:'win5',desc:'Win 5 matches today',check:()=>true,count:5},
  {id:'streak3',desc:'Reach a 3 win streak',check:()=>(playerProfile?.winStreak||0)>=3,instant:true},
  {id:'campaign1',desc:'Clear a campaign stage',check:()=>true,campaign:true},
];
function getDailyChallenges(){
  // Seed 3 challenges from date
  const d=getTodayStr();let seed=0;for(let i=0;i<d.length;i++)seed=((seed<<5)-seed)+d.charCodeAt(i);
  seed=Math.abs(seed);
  const picks=[];const pool=[...CHALLENGE_POOL];
  for(let i=0;i<3&&pool.length;i++){const idx=seed%(pool.length);picks.push(pool.splice(idx,1)[0]);seed=Math.abs((seed*31+7)%99991)}
  return picks;
}
let dailyChallenges=getDailyChallenges();
let dailyWinsToday=0;
let dailyCampaignToday=0;

function initDailies(){
  if(!playerProfile)return;
  const today=getTodayStr();
  if(!playerProfile.dailyChallenges||playerProfile.dailyChallenges.date!==today){
    playerProfile.dailyChallenges={date:today,completed:[],claimed:false};
    dailyWinsToday=0;dailyCampaignToday=0;
  }
  dailyChallenges=getDailyChallenges();
}
function checkDailyChallenge(winCharId,isCampaignWin){
  if(!playerProfile)return;
  initDailies();
  dailyWinsToday++;if(isCampaignWin)dailyCampaignToday++;
  const dc=playerProfile.dailyChallenges;
  const challenges=getDailyChallenges();
  for(let i=0;i<challenges.length;i++){
    if(dc.completed.includes(i))continue;
    const ch=challenges[i];
    let pass=false;
    if(ch.instant)pass=ch.check(winCharId);
    else if(ch.campaign)pass=isCampaignWin;
    else if(ch.count)pass=dailyWinsToday>=ch.count;
    else pass=ch.check(winCharId);
    if(pass)dc.completed.push(i);
  }
  // Award talent points for completing all 3
  if(dc.completed.length>=3&&!dc.claimed){dc.claimed=true;playerProfile.talentPoints=(playerProfile.talentPoints||0)+3}
  saveProfile();
}

// ─── Personal Records (was global leaderboard) ───
// Standalone build: there is no shared backend, so the "leaderboard"
// screen now shows the local player's all-time stats.
let leaderboardData=[];let leaderboardLoading=false;
function loadLeaderboard(){
  leaderboardLoading=false;
  if(!playerProfile){leaderboardData=[];return}
  leaderboardData=[{
    name:playerProfile.displayName||'Player',
    wins:playerProfile.totalWins||0,
    streak:playerProfile.bestStreak||0,
    survival:playerProfile.survivalBest||0
  }];
}

// ─── Survival Mode State ───
let survWave=0,survKills=0,survHP=100,survMaxHP=100,survActive=false,survCharId=0;

function loadLocalProfile(){
  const stored=lsLoad(LS_PROFILE,null);
  if(stored){
    playerProfile=stored;
    if(!playerProfile.characters)playerProfile.characters={};
    for(const c of ALL_CHAR_IDS){
      if(!playerProfile.characters[c])playerProfile.characters[c]={...DEFAULT_TALENTS};
    }
    if(!playerProfile.displayName)playerProfile.displayName=currentUser.displayName;
  }else{
    playerProfile=defaultProfile(currentUser.displayName);
    lsSave(LS_PROFILE,playerProfile);
  }
  campProgress=lsLoad(LS_CAMPAIGN,{})||{};
}
// Auto-load on startup — no auth required.
loadLocalProfile();

function changePlayerName(){
  const cur=playerProfile?.displayName||currentUser.displayName||'Player';
  const next=(typeof prompt==='function')?prompt('Enter your name:',cur):null;
  if(next==null)return;
  const trimmed=String(next).trim().slice(0,18)||'Player';
  currentUser.displayName=trimmed;
  if(playerProfile)playerProfile.displayName=trimmed;
  lsSave(LS_NAME,trimmed);
  saveProfile();
}
function resetLocalProfile(){
  if(typeof confirm==='function'&&!confirm('Erase all local progress?'))return;
  try{localStorage.removeItem(LS_PROFILE);localStorage.removeItem(LS_CAMPAIGN)}catch(e){}
  playerProfile=defaultProfile(currentUser.displayName);
  campProgress={};
  lsSave(LS_PROFILE,playerProfile);
}
function saveProfile(){
  if(!playerProfile)return;
  lsSave(LS_PROFILE,playerProfile);
}
async function awardWin(winCharId,isCampaign=false){
  if(!currentUser||!playerProfile)return;
  playerProfile.totalWins=(playerProfile.totalWins||0)+1;
  playerProfile.talentPoints=(playerProfile.talentPoints||0)+1;
  playerProfile.winStreak=(playerProfile.winStreak||0)+1;
  playerProfile.bestStreak=Math.max(playerProfile.bestStreak||0,playerProfile.winStreak);
  checkDailyChallenge(winCharId,isCampaign);
  await saveProfile();
}
function recordLoss(){
  if(!currentUser||!playerProfile)return;
  playerProfile.winStreak=0;saveProfile();
}
function getTalents(charId){
  if(!playerProfile||!playerProfile.characters||!playerProfile.characters[charId])return{...DEFAULT_TALENTS};
  return playerProfile.characters[charId];
}
function spendTalentPoint(charId,talent){
  if(!playerProfile||playerProfile.talentPoints<=0)return false;
  const t=playerProfile.characters[charId];
  if(!t||t[talent]>=5)return false;
  t[talent]++;
  playerProfile.talentPoints--;
  saveProfile();
  return true;
}

// Talent tree state
let ttChar=0; // selected character index in talent tree
const TALENT_DEFS=[
  {key:'hp',name:'VITALITY',desc:'+5 Max HP',color:'#0f0',icon:'♥'},
  {key:'damage',name:'POWER',desc:'+1 Attack DMG',color:'#f44',icon:'⚔'},
  {key:'speed',name:'AGILITY',desc:'+0.3 Speed',color:'#ff0',icon:'»'},
  {key:'special',name:'TECHNIQUE',desc:'+2 Special DMG',color:'#f0f',icon:'★'},
  {key:'defense',name:'ARMOR',desc:'-2% DMG Taken',color:'#4af',icon:'◆'}
];

const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const W=960,H=540,GROUND=430,GRAVITY=0.65,ROUND_TIME=60,ROUNDS_TO_WIN=2;

// Mouse handling for talent tree + UI buttons
let mouseX=0,mouseY=0,mouseClicked=false;
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouseX=(e.clientX-r.left)*(W/r.width);mouseY=(e.clientY-r.top)*(H/r.height)});
canvas.addEventListener('click',()=>{mouseClicked=true});

// ─── Shake / Hitstop ───
let shakeX=0,shakeY=0,shakeMag=0,hitstopFrames=0;
function triggerShake(m){shakeMag=Math.max(shakeMag,m)}
function triggerHitstop(f){hitstopFrames=Math.max(hitstopFrames,f)}

// ─── Input ───
const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;e.preventDefault()});
window.addEventListener('keyup',e=>{keys[e.code]=false});
function keyPressed(c){return!!keys[c]}
function keyJustPressed(c){if(keys[c]&&!keys['_p_'+c]){keys['_p_'+c]=true;return true}return false}
function clearJustPressed(){for(const k in keys)if(!k.startsWith('_p_'))keys['_p_'+k]=keys[k]}

// ─── Audio ───
const AC=new(window.AudioContext||window.webkitAudioContext)();
function snd(f,d,t='square',v=.08){try{const o=AC.createOscillator(),g=AC.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d)}catch(e){}}
function hitSound(){snd(150,.15,'sawtooth',.12);snd(90,.2,'square',.08)}
function heavyHitSound(){snd(60,.3,'sawtooth',.2);snd(40,.4,'square',.12);snd(200,.1,'sawtooth',.06)}
function blockSound(){snd(80,.1,'triangle',.06)}
function specialSound(){snd(400,.3,'sawtooth',.1)}
function koSound(){snd(100,.8,'sawtooth',.2);snd(40,1,'square',.15);snd(30,1.2,'sawtooth',.1)}
function menuSound(){snd(600,.08,'sine',.05)}
function splatSound(){snd(120,.15,'sawtooth',.1);snd(80,.2,'square',.06)}
function goSound(){snd(50,.5,'sawtooth',.25);snd(25,.7,'square',.15)}

// ══════════════════════════════════════
//  EXTREME BLOOD SYSTEM
// ══════════════════════════════════════
const bloodDrops=[],bloodPools=[],bloodSplatters=[],screenBlood=[],bloodTrails=[];
const bloodMist=[];  // ambient blood mist
let totalBloodSpilled=0; // tracks carnage level

const BCOL=['#cc0000','#aa0000','#880000','#ff0000','#dd1111','#990000','#bb0505','#ff2020','#ff3030','#dd0505','#ee0808','#770000','#ff1515'];
function rBlood(){return BCOL[Math.floor(Math.random()*BCOL.length)]}

function spawnBlood(x,y,dir,count,force=10){
  for(let i=0;i<count;i++){
    const a=dir===0?(Math.random()*Math.PI*2):(dir>0?0:Math.PI)+(Math.random()-.5)*2;
    const s=force*.5+Math.random()*force;
    bloodDrops.push({x,y:y+(Math.random()-.5)*25,vx:Math.cos(a)*s+(Math.random()-.5)*4,vy:Math.sin(a)*s*.6-Math.random()*force*.9,size:1.5+Math.random()*5,color:rBlood(),life:1,gravity:.25+Math.random()*.2,drips:Math.random()>.4});
  }
  totalBloodSpilled+=count;
}

function spawnBloodExplosion(x,y,count=80){
  // Cap actual spawns to avoid flooding
  const actual=Math.min(count,60);
  for(let i=0;i<actual;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*16;
    bloodDrops.push({x:x+(Math.random()-.5)*20,y:y+(Math.random()-.5)*20,vx:Math.cos(a)*s,vy:Math.sin(a)*s-Math.random()*6,size:2+Math.random()*7,color:rBlood(),life:1,gravity:.2+Math.random()*.2,drips:Math.random()>.5});
  }
  // Chunks - fewer but bigger
  for(let i=0;i<Math.min(actual/4,12);i++){
    const a=Math.random()*Math.PI*2,s=3+Math.random()*10;
    bloodDrops.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-Math.random()*8,size:5+Math.random()*8,color:i%3===0?'#660000':i%3===1?'#440000':'#550011',life:1,gravity:.35,drips:false,chunk:true,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-.5)*.4});
  }
  // Blood mist - fewer
  for(let i=0;i<6;i++){
    bloodMist.push({x:x+(Math.random()-.5)*60,y:y+(Math.random()-.5)*40,size:25+Math.random()*45,opacity:.3+Math.random()*.3,decay:.006+Math.random()*.004,vx:(Math.random()-.5)*1,vy:-Math.random()*.5});
  }
  totalBloodSpilled+=count*2;
}

function spawnBloodGeyser(x,y,count=60){
  const actual=Math.min(count,30);
  for(let i=0;i<actual;i++){
    bloodDrops.push({x:x+(Math.random()-.5)*10,y,vx:(Math.random()-.5)*5,vy:-8-Math.random()*15,size:2+Math.random()*5,color:rBlood(),life:1,gravity:.3,drips:Math.random()>.6});
  }
  totalBloodSpilled+=count;
}

function spawnScreenBlood(x,y,count=5){
  for(let i=0;i<count;i++){
    screenBlood.push({x:x+(Math.random()-.5)*300,y:y+(Math.random()-.5)*150,size:20+Math.random()*60,opacity:.5+Math.random()*.4,decay:.002+Math.random()*.004,dripY:0,dripSpeed:.2+Math.random()*.8,shape:Math.floor(Math.random()*4)});
  }
}

function spawnBloodPool(x){
  bloodPools.push({x:x+(Math.random()-.5)*30,y:GROUND+1,w:10+Math.random()*20,maxW:30+Math.random()*60,h:2+Math.random()*3,color:rBlood(),opacity:.8+Math.random()*.2,growing:true});
}

function updateBlood(){
  // Hard caps to prevent runaway particle counts
  while(bloodDrops.length>300)bloodDrops.shift();
  while(bloodTrails.length>200)bloodTrails.shift();

  for(let i=bloodDrops.length-1;i>=0;i--){
    const b=bloodDrops[i];
    b.x+=b.vx;b.y+=b.vy;b.vy+=b.gravity;b.vx*=.99;b.life-=.008;
    if(b.chunk)b.rot+=b.rotSpeed;
    if(b.drips&&Math.random()>.7&&bloodTrails.length<200)bloodTrails.push({x:b.x,y:b.y,size:b.size*.4,color:b.color,life:1});
    if(b.y>=GROUND){
      if(bloodPools.length<60)spawnBloodPool(b.x);
      if(b.size>3.5&&bloodDrops.length<250)for(let j=0;j<2;j++)bloodDrops.push({x:b.x,y:GROUND-2,vx:(Math.random()-.5)*4,vy:-Math.random()*3-1,size:1+Math.random()*1.5,color:b.color,life:.4,gravity:.4,drips:false});
      bloodDrops.splice(i,1);continue;
    }
    if(b.x<5||b.x>W-5){
      if(bloodSplatters.length<25)bloodSplatters.push({x:b.x<5?2:W-2,y:b.y,size:b.size*2,color:b.color,life:1,dripY:0,dripSpeed:.3+Math.random()*.7});
      bloodDrops.splice(i,1);continue;
    }
    if(b.life<=0){bloodDrops.splice(i,1)}
  }
  for(let i=bloodTrails.length-1;i>=0;i--){bloodTrails[i].life-=.025;if(bloodTrails[i].life<=0)bloodTrails.splice(i,1)}
  for(const p of bloodPools){if(p.growing&&p.w<p.maxW)p.w+=.5;else{p.growing=false;p.opacity-=.0003}}
  while(bloodPools.length>60)bloodPools.shift();
  for(let i=bloodSplatters.length-1;i>=0;i--){bloodSplatters[i].dripY+=bloodSplatters[i].dripSpeed;bloodSplatters[i].life-=.002;if(bloodSplatters[i].life<=0)bloodSplatters.splice(i,1)}
  while(bloodSplatters.length>25)bloodSplatters.shift();
  for(let i=screenBlood.length-1;i>=0;i--){const s=screenBlood[i];s.opacity-=s.decay;s.dripY+=s.dripSpeed;if(s.opacity<=0)screenBlood.splice(i,1)}
  for(let i=bloodMist.length-1;i>=0;i--){const m=bloodMist[i];m.x+=m.vx;m.y+=m.vy;m.opacity-=m.decay;if(m.opacity<=0)bloodMist.splice(i,1)}
}

function drawBloodPools(){
  // No shadowBlur - just flat ellipses, much faster
  ctx.shadowBlur=0;
  for(const p of bloodPools){
    ctx.globalAlpha=p.opacity;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.ellipse(p.x,p.y,p.w,p.h,0,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawBloodTrails(){
  ctx.shadowBlur=0;
  for(const t of bloodTrails){ctx.globalAlpha=t.life*.5;ctx.fillStyle=t.color;
    const s=t.size*t.life;ctx.fillRect(t.x-s,t.y-s,s*2,s*2);}
  ctx.globalAlpha=1;
}
function drawBloodDrops(){
  // No shadowBlur, no save/restore per particle - use fillRect for speed
  ctx.shadowBlur=0;
  for(const b of bloodDrops){
    ctx.globalAlpha=b.life;ctx.fillStyle=b.color;
    if(b.chunk){
      const s=b.size;ctx.fillRect(b.x-s/2,b.y-s/2,s,s*.7);
    }else{
      // Simple stretched rect instead of rotated ellipse
      const speed=Math.abs(b.vx)+Math.abs(b.vy);
      const stretch=Math.min(2.5,speed*.15);
      const sw=b.size*(1+stretch),sh=b.size*.7;
      ctx.fillRect(b.x-sw/2,b.y-sh/2,sw,sh);
    }
  }
  ctx.globalAlpha=1;
}
function drawWallSplatters(){
  ctx.shadowBlur=0;
  for(const s of bloodSplatters){
    ctx.globalAlpha=s.life*.8;ctx.fillStyle=s.color;
    ctx.beginPath();ctx.arc(s.x,s.y,s.size,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#990000';ctx.fillRect(s.x-1.5,s.y,3,s.dripY);
    ctx.fillRect(s.x-2,s.y+s.dripY-1,4,3);// drip bulb as rect
  }
  ctx.globalAlpha=1;
}
function drawBloodMist(){
  // Simple semi-transparent circles, no gradient creation per frame
  ctx.shadowBlur=0;
  for(const m of bloodMist){
    ctx.globalAlpha=m.opacity*.3;ctx.fillStyle='rgba(150,0,0,0.4)';
    ctx.beginPath();ctx.arc(m.x,m.y,m.size,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawScreenBlood(){
  ctx.shadowBlur=0;
  for(const s of screenBlood){
    ctx.globalAlpha=s.opacity;ctx.fillStyle='rgba(180,0,0,0.8)';
    if(s.shape===0){ctx.beginPath();for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2,r=s.size*(.5+Math.sin(i*3.7)*.3);if(i===0)ctx.moveTo(s.x+Math.cos(a)*r,s.y+Math.sin(a)*r+s.dripY*.5);else ctx.lineTo(s.x+Math.cos(a)*r,s.y+Math.sin(a)*r+s.dripY*.5)}ctx.closePath();ctx.fill()}
    else if(s.shape===1){for(let i=0;i<5;i++)ctx.fillRect(s.x+i*8-20,s.y+s.dripY*.3,3,s.size*.8+s.dripY)}
    else if(s.shape===2){ctx.beginPath();ctx.arc(s.x,s.y,s.size*.5,0,Math.PI*2);ctx.fill();ctx.fillRect(s.x-2,s.y,4,s.size+s.dripY)}
    else{for(let i=0;i<5;i++){ctx.fillRect(s.x-15+i*8,s.y-10+Math.abs(i-2)*3,4,12+s.dripY*.5)}
      ctx.beginPath();ctx.ellipse(s.x,s.y+8,18,12,0,0,Math.PI*2);ctx.fill();}
  }
  ctx.globalAlpha=1;
}
function clearBlood(){bloodDrops.length=0;bloodPools.length=0;bloodSplatters.length=0;screenBlood.length=0;bloodTrails.length=0;bloodMist.length=0;totalBloodSpilled=0}

// ─── Particles ───
const particles=[];
function spawnParticles(x,y,color,count=8,spread=8,sMin=2,sMax=5){for(let i=0;i<count;i++)particles.push({x,y,vx:(Math.random()-.5)*spread*2,vy:(Math.random()-.5)*spread*2-2,life:1,decay:.015+Math.random()*.02,color,size:Math.random()*(sMax-sMin)+sMin,type:Math.random()>.5?'circle':'square'})}
function spawnSparks(x,y,color,count=12){for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*8;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:.03+Math.random()*.03,color,size:1+Math.random()*2,type:'line',angle:a,len:4+Math.random()*8})}}
function updateParticles(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.vx*=.98;p.life-=p.decay;if(p.life<=0)particles.splice(i,1)}}
function drawParticles(){ctx.shadowBlur=0;for(const p of particles){ctx.globalAlpha=p.life*p.life;ctx.fillStyle=p.color;ctx.strokeStyle=p.color;if(p.type==='circle'){ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill()}else if(p.type==='line'){ctx.lineWidth=p.size*p.life;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.vx*p.len*.3,p.y-p.vy*p.len*.3);ctx.stroke()}else{ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size*p.life,p.size*p.life)}}ctx.globalAlpha=1}

// ─── Projectiles ───
const projectiles=[];
function spawnProjectile(owner,x,y,dir,color,dmg=12){projectiles.push({owner,x,y,vx:dir*7,w:35,h:16,color,life:70,damage:dmg,trail:[]});specialSound()}
function updateProjectiles(fighters){
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];p.trail.push({x:p.x,y:p.y,life:1});if(p.trail.length>12)p.trail.shift();
    for(const t of p.trail)t.life-=.08;p.x+=p.vx;p.life--;
    if(p.life<=0||p.x<-50||p.x>W+50){projectiles.splice(i,1);continue}
    for(const f of fighters){if(f===p.owner)continue;
      if(p.x+p.w/2>f.x-f.bodyW/2&&p.x-p.w/2<f.x+f.bodyW/2&&p.y+p.h/2>f.y-f.bodyH&&p.y-p.h/2<f.y){
        if(f.blocking){blockSound();spawnSparks(p.x,p.y,'#fff',8);f.pushback=p.vx>0?5:-5}
        else{f.takeDamage(p.damage,p.vx>0?1:-1);triggerShake(6)}
        projectiles.splice(i,1);break}}
  }
}

// ─── Fighter Class ───
class Fighter{
  constructor(cid,x,facing,controls){
    const d=CHARACTERS[cid];this.charId=cid;this.data=d;this.x=x;this.y=GROUND;this.vx=0;this.vy=0;this.facing=facing;
    this.bodyW=44;this.bodyH=cid==='titan'||cid==='raze'?105:95;this.hp=100;this.maxHp=100;this.wins=0;this.controls=controls;
    this.state='idle';this.stateTimer=0;this.attackType=null;this.attackPhase='startup';this.blocking=false;
    this.hitstunTimer=0;this.pushback=0;this.comboCount=0;this.comboTimer=0;this.animFrame=0;this.isAI=false;
    this.dashTimer=0;this.flashTimer=0;this.breathOffset=0;this.bleeding=false;this.bleedTimer=0;
    this.teleportAlpha=1;this.flurryHits=0;
    this.atkStartup=0;this.atkActive=0;this.atkRecovery=0;this.atkOpp=null;this.atkHitDone=false;
    this.projDelay=0;
  }
  reset(x){this.x=x;this.y=GROUND;this.vx=0;this.vy=0;this.hp=this.maxHp;this.state='idle';this.stateTimer=0;this.attackType=null;this.attackPhase='startup';this.blocking=false;this.hitstunTimer=0;this.pushback=0;this.comboCount=0;this.comboTimer=0;this.flashTimer=0;this.dashTimer=0;this.bleeding=false;this.bleedTimer=0;this.teleportAlpha=1;this.flurryHits=0;this.atkStartup=0;this.atkActive=0;this.atkRecovery=0;this.atkOpp=null;this.atkHitDone=false;this.projDelay=0}

  takeDamage(dmg,dir){
    if(this.defenseBonus)dmg=Math.max(1,Math.round(dmg*(1-this.defenseBonus)));
    this.hp=Math.max(0,this.hp-dmg);this.hitstunTimer=15;this.state='hitstun';this.stateTimer=15;
    this.pushback=dir*6;this.flashTimer=12;
    const hx=this.x+dir*15,hy=this.y-50;
    const ba=Math.floor(dmg*2);// blood scaled to damage
    spawnBlood(hx,hy,dir,ba,dmg);
    spawnBlood(hx,hy-20,dir,Math.floor(ba*.5),dmg*.7);// extra spray upward
    if(this.hp<50){this.bleeding=true;this.bleedTimer=180}
    if(this.hp<25){spawnBlood(hx,hy+10,-dir,Math.floor(ba*.3),dmg*.5)}// blood out the back too
    if(dmg>=12){heavyHitSound();triggerShake(dmg>15?14:9);triggerHitstop(dmg>15?8:5);spawnSparks(hx,hy,'#fff',25);spawnBlood(hx,hy,dir,ba,dmg*1.2);spawnScreenBlood(hx,hy,3);spawnBloodGeyser(hx,hy-10,15)}
    else{hitSound();triggerShake(5);triggerHitstop(3);spawnSparks(hx,hy,'#fff',15)}
    spawnParticles(hx,hy,this.data.color,8,6,2,5);
    if(this.hp<=0){
      this.state='ko';this.stateTimer=150;koSound();goSound();
      triggerShake(25);triggerHitstop(15);
      spawnBloodExplosion(this.x,this.y-50,60);
      spawnBloodGeyser(this.x,this.y-60,30);
      spawnBloodGeyser(this.x-20,this.y-40,15);
      spawnBloodGeyser(this.x+20,this.y-40,15);
      spawnScreenBlood(W/2,H/2,8);
      spawnBlood(this.x,this.y-60,dir,30,16);
      spawnBlood(this.x,this.y-30,-dir,25,14);
      spawnBlood(this.x,this.y-80,0,20,10);
      spawnParticles(this.x,this.y-40,'#ff0',20,12,3,8);
    }
  }

  get onGround(){return this.y>=GROUND}

  update(opp){
    this.animFrame++;this.breathOffset=Math.sin(this.animFrame*.05)*1.5;
    this.flashTimer=Math.max(0,this.flashTimer-1);this.comboTimer=Math.max(0,this.comboTimer-1);
    if(this.comboTimer===0)this.comboCount=0;
    if(this.bleeding&&this.bleedTimer>0){this.bleedTimer--;if(this.animFrame%6===0)spawnBlood(this.x+(Math.random()-.5)*20,this.y-50,this.facing,2,3);if(this.bleedTimer<=0)this.bleeding=false}
    if(this.hp<25&&this.hp>0&&this.animFrame%8===0&&bloodDrops.length<200){bloodDrops.push({x:this.x+(Math.random()-.5)*15,y:this.y-40-Math.random()*30,vx:(Math.random()-.5)*2,vy:.5+Math.random()*2,size:1+Math.random()*3,color:rBlood(),life:.8,gravity:.3,drips:true});
      if(this.animFrame%24===0&&bloodPools.length<50)spawnBloodPool(this.x+(Math.random()-.5)*20)}
    if(this.pushback!==0){this.x+=this.pushback*.5;this.pushback*=.8;if(Math.abs(this.pushback)<.5)this.pushback=0}
    if(this.state!=='attack'&&this.state!=='special'&&this.state!=='ko')this.facing=opp.x>this.x?1:-1;
    if(!this.onGround){this.vy+=GRAVITY;this.y+=this.vy;if(this.y>=GROUND){this.y=GROUND;this.vy=0;if(this.state==='jump')this.state='idle';spawnParticles(this.x,GROUND,'rgba(150,150,200,0.5)',4,3,1,3)}}
    if(this.state==='hitstun'){this.stateTimer--;if(this.stateTimer<=0)this.state='idle';return}
    if(this.state==='ko'){this.stateTimer--;if(this.animFrame%5===0&&bloodDrops.length<250)bloodDrops.push({x:this.x+(Math.random()-.5)*35,y:this.y-15-Math.random()*25,vx:(Math.random()-.5)*1.5,vy:1+Math.random()*2.5,size:2+Math.random()*3,color:rBlood(),life:.7,gravity:.4,drips:false});return}
    if(this.state==='attack'||this.state==='special'){
      this.stateTimer--;
      // Frame-counted attack phases
      if(this.state==='attack'){
        if(this.atkStartup>0){this.atkStartup--;this.attackPhase='startup'}
        else if(this.atkActive>0){
          if(!this.atkHitDone){this.atkHitDone=true;this.attackPhase='active';
            const atk=this.data.attacks[this.attackType];
            const hx=this.x+this.facing*atk.range,hy=this.y+atk.hy;
            const dist=Math.abs(hx-opp.x),vOk=opp.y-opp.bodyH<hy+atk.hh&&opp.y>hy;
            if(dist<48&&vOk){if(opp.blocking){blockSound();spawnSparks(opp.x-opp.facing*20,opp.y-45,'#fff',6);opp.pushback=this.facing*(atk.knockback*.3)}
            else{const cd=Math.max(1,atk.damage-this.comboCount);opp.takeDamage(cd,this.facing);this.comboCount++;this.comboTimer=45}}
            snd(200+(this.attackType==='kick'?100:0),.08,'sawtooth',.04);
          }
          this.atkActive--;
        }
        else{this.attackPhase='recovery';this.atkRecovery--;if(this.atkRecovery<=0){this.state=this.onGround?'idle':'jump'}}
      }
      // Frame-counted projectile delay
      if(this.projDelay>0){this.projDelay--;if(this.projDelay===0&&this.state==='special')spawnProjectile(this,this.x+this.facing*40,this.y-50,this.facing,this.data.color)}
      // Dash-type specials
      if(this.state==='special'&&this.dashTimer>0){
        this.dashTimer--;
        const st=this.data.specialType;
        if(st==='dash'||st==='charge')this.x+=this.facing*this.data.dashSpeed;
        if(st==='groundpound'&&this.dashTimer===0){
          // Ground pound shockwave
          triggerShake(12);spawnBlood(this.x,GROUND-5,1,20,8);spawnBlood(this.x,GROUND-5,-1,20,8);
          spawnParticles(this.x,GROUND,'#f80',20,15,3,6);
          const dist=Math.abs(this.x-opp.x);
          if(dist<this.data.specialRange){if(opp.blocking){blockSound();opp.pushback=this.facing*10}else{opp.takeDamage(this.data.specialDamage,this.facing)}}
        }
        if(st==='teleport'&&this.dashTimer===Math.floor(this.data.specialStartup/2)){
          // Teleport behind opponent
          this.teleportAlpha=0;this.x=opp.x-opp.facing*60;
          this.facing=opp.x>this.x?1:-1;// update facing after teleport
          spawnParticles(this.x,this.y-50,this.data.color,15,8,2,5);
        }
        if(st==='flurry'&&this.dashTimer>0&&this.dashTimer%2===0){
          // Multi-hit slash
          const dist=Math.abs(this.x-opp.x);
          if(dist<this.data.specialRange){if(opp.blocking){blockSound();spawnSparks(opp.x,opp.y-45,'#fff',4)}else{opp.takeDamage(5,this.facing);this.flurryHits++}}
        }
        if((st==='dash'||st==='charge')&&this.dashTimer===0){
          const dist=Math.abs(this.x-opp.x);
          if(dist<this.data.specialRange){if(opp.blocking){blockSound();opp.pushback=this.facing*8}else{opp.takeDamage(this.data.specialDamage,this.facing)}}
        }
        if(st==='teleport'&&this.dashTimer===0){
          const dist=Math.abs(this.x-opp.x);
          if(dist<80){if(opp.blocking){blockSound();opp.pushback=this.facing*6}else{opp.takeDamage(this.data.specialDamage,this.facing)}}
          this.teleportAlpha=1;
        }
      }
      if(this.teleportAlpha<1)this.teleportAlpha=Math.min(1,this.teleportAlpha+.15);
      if(this.state==='special'&&this.stateTimer<=0){this.state=this.onGround?'idle':'jump';this.flurryHits=0}
      return;
    }
    const c=this.controls;if(!c)return;
    const left=keyPressed(c.left),right=keyPressed(c.right),up=keyPressed(c.up),down=keyPressed(c.down);
    const punch=keyJustPressed(c.punch),kick=keyJustPressed(c.kick),special=keyJustPressed(c.special);
    this.blocking=false;
    if(this.onGround&&this.state!=='attack'){const hb=(this.facing===1&&left)||(this.facing===-1&&right);if(hb)this.blocking=true}
    if(special&&this.onGround){
      this.state='special';this.stateTimer=this.data.specialStartup+this.data.specialRecovery;
      this.dashTimer=this.data.specialStartup;this.flurryHits=0;
      if(this.data.hasProjectile){
        this.dashTimer=0;
        this.projDelay=this.data.specialStartup;
      }
      specialSound();return;
    }
    if(punch){this.performAttack('punch',opp);return}
    if(kick){this.performAttack('kick',opp);return}
    if(this.onGround&&!this.blocking){
      if(left){this.x-=this.data.walkSpeed;this.state='walk'}
      else if(right){this.x+=this.data.walkSpeed;this.state='walk'}
      else if(down){this.state='crouch'}else{this.state='idle'}
      if(up){this.vy=this.data.jumpForce;this.y-=1;this.state='jump';snd(300,.1,'sine',.04)}
    }
    this.x=Math.max(30,Math.min(W-30,this.x));
  }

  performAttack(type,opp){
    const atk=this.data.attacks[type];this.state='attack';this.attackType=type;
    this.stateTimer=atk.startup+atk.active+atk.recovery;
    this.atkStartup=atk.startup;this.atkActive=atk.active;this.atkRecovery=atk.recovery;
    this.attackPhase='startup';this.atkHitDone=false;this.atkOpp=opp;
  }

  draw(){
    const f=this.facing,bx=this.x,by=this.y,d=this.data;
    const crouching=this.state==='crouch';const bodyH=crouching?60:this.bodyH;
    const headY=by-bodyH,breath=this.breathOffset;
    const torsoTop=headY+22,torsoBot=by-30,hipY=by-28,shoulderY=torsoTop+5;
    const isBig=this.charId==='titan'||this.charId==='raze';
    const bScale=isBig?1.15:1;

// ─── AI ───
class AI{
  constructor(f,diff=.5){this.f=f;this.diff=diff;this.timer=0;this.act='approach'}
  update(opp){
    const f=this.f,c=f.controls,dist=Math.abs(f.x-opp.x);
    for(const k of Object.values(c))keys[k]=false;
    if(f.state==='hitstun'||f.state==='ko'||f.state==='attack'||f.state==='special')return;
    this.timer--;
    if(this.timer<=0){
      this.timer=Math.floor(12+Math.random()*18*(1-this.diff));
      if(dist>200)this.act='approach';
      else if(dist<80){const r=Math.random();if(r<.3*this.diff)this.act='punch';else if(r<.5*this.diff)this.act='kick';else if(r<.6*this.diff)this.act='special';else if(r<.7)this.act='block';else this.act='retreat'}
      else{const r=Math.random();if(r<.4)this.act='approach';else if(r<.55*this.diff)this.act='special';else if(r<.65)this.act='jump_in';else this.act='idle'}
    }
    const tw=opp.x>f.x?c.right:c.left,aw=opp.x>f.x?c.left:c.right;
    switch(this.act){case'approach':keys[tw]=true;break;case'retreat':keys[aw]=true;break;
      case'punch':if(dist<70)keys[c.punch]=true;else keys[tw]=true;break;
      case'kick':if(dist<80)keys[c.kick]=true;else keys[tw]=true;break;
      case'special':keys[c.special]=true;break;case'block':keys[aw]=true;break;
      case'jump_in':keys[c.up]=true;keys[tw]=true;break}
    if(opp.state==='attack'&&dist<90&&Math.random()<this.diff*.5){for(const k of Object.values(c))keys[k]=false;keys[aw]=true}
  }
}

  if(r<.3&&r>0){ctx.fillStyle='rgba(200,0,0,0.5)';for(let i=0;i<4;i++){const dx=x+(flip?w-bw+Math.random()*bw:2+Math.random()*bw);ctx.fillRect(dx,y+24,2,5+Math.sin(flickT*.1+i)*4)}}
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(x+2,y+2,w-4,10);

}

// ─── Pause Menu ───
function checkPause(){
  if(keyJustPressed('Escape')&&(gameState==='fight'||gameState==='campaignScroll'||gameState==='survivalFight')){
    paused=!paused;pauseSel=0;menuSound();
  }
}
function drawPauseMenu(){
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
  drawNeonText('PAUSED',W/2,140,'#fff',48);
  const opts=['RESUME','SAVE','QUIT TO MENU'];
  for(let i=0;i<opts.length;i++){
    const y=240+i*60;const sel=pauseSel===i;
    if(sel){ctx.fillStyle='rgba(0,255,255,0.06)';ctx.fillRect(W/2-120,y-22,240,44);ctx.strokeStyle='#0ff';ctx.lineWidth=2;ctx.strokeRect(W/2-120,y-22,240,44)}
    drawNeonText(opts[i],W/2,y,sel?'#0ff':'#666',22);
    if(sel)drawNeonText('>',W/2-100,y,'#ff0',22);
  }
  if(saveFlashTimer>0){saveFlashTimer--;drawNeonText('SAVED!',W/2,420,'#0f0',20)}
  if(lastSaveTime)drawNeonText(`Last save: ${lastSaveTime}`,W/2,450,'#555',11);
  if(keyJustPressed('ArrowUp')||keyJustPressed('KeyW')){pauseSel=(pauseSel+opts.length-1)%opts.length;menuSound()}
  if(keyJustPressed('ArrowDown')||keyJustPressed('KeyS')){pauseSel=(pauseSel+1)%opts.length;menuSound()}
  if(keyJustPressed('Enter')||keyJustPressed('Space')){
    if(pauseSel===0){paused=false;menuSound()}// resume
    else if(pauseSel===1){// save
      saveProfile();saveCampaignProgress();
      lastSaveTime=new Date().toLocaleTimeString();saveFlashTimer=90;menuSound();
    }
    else if(pauseSel===2){// quit
      paused=false;gameState='title';fighters=[];projectiles.length=0;particles.length=0;clearBlood();menuSound();
    }
  }
}

// ─── Talent Tree Screen ───
function drawTalentTree(){
  if(!bgCanvas)buildBg();ctx.drawImage(bgCanvas,0,0);drawDynBg();
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);

  drawNeonText('TALENT TREE',W/2,30,'#fff',28);
  if(playerProfile)drawNeonText(`Available Points: ${playerProfile.talentPoints||0}`,W/2,55,'#ff0',16);

  // Character tabs
  const tabW=130,tabH=32,tabY=70,tabStartX=(W-charIds.length*tabW-(charIds.length-1)*8)/2;
  for(let i=0;i<charIds.length;i++){
    const cd=CHARACTERS[charIds[i]];
    const tx=tabStartX+i*(tabW+8);
    const sel=ttChar===i;
    ctx.fillStyle=sel?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.3)';
    ctx.fillRect(tx,tabY,tabW,tabH);
    if(sel){ctx.strokeStyle=cd.color;ctx.shadowColor=cd.color;ctx.shadowBlur=10;ctx.lineWidth=2;ctx.strokeRect(tx,tabY,tabW,tabH);ctx.shadowBlur=0}
    else{ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(tx,tabY,tabW,tabH)}
    drawNeonText(cd.name,tx+tabW/2,tabY+tabH/2,sel?cd.color:'#666',14);
    // Click tab
    if(mouseClicked&&mouseX>=tx&&mouseX<=tx+tabW&&mouseY>=tabY&&mouseY<=tabY+tabH){ttChar=i;menuSound()}
  }

  const cid=charIds[ttChar];
  const cd=CHARACTERS[cid];
  const talents=getTalents(cid);

  // Talent columns
  const colW=150,colH=310,colGap=12;
  const totalColW=TALENT_DEFS.length*colW+(TALENT_DEFS.length-1)*colGap;
  const colStartX=(W-totalColW)/2,colStartY=115;

  for(let t=0;t<TALENT_DEFS.length;t++){
    const td=TALENT_DEFS[t];
    const cx=colStartX+t*(colW+colGap);
    const lvl=talents[td.key]||0;

    // Column background
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(cx,colStartY,colW,colH);
    ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(cx,colStartY,colW,colH);

    // Header
    ctx.fillStyle=td.color;ctx.globalAlpha=.15;ctx.fillRect(cx,colStartY,colW,45);ctx.globalAlpha=1;
    drawNeonText(td.icon,cx+colW/2,colStartY+15,td.color,18);
    drawNeonText(td.name,cx+colW/2,colStartY+33,td.color,12);

    // Level nodes
    for(let l=0;l<5;l++){
      const ny=colStartY+60+l*48;
      const filled=l<lvl;
      const isNext=l===lvl;

      // Connection line
      if(l>0){
        ctx.strokeStyle=l<=lvl?td.color:'#333';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(cx+colW/2,ny-25);ctx.lineTo(cx+colW/2,ny-5);ctx.stroke();
      }

      // Node
      const nodeR=16;
      ctx.beginPath();ctx.arc(cx+colW/2,ny+nodeR,nodeR,0,Math.PI*2);
      if(filled){
        ctx.fillStyle=td.color;ctx.fill();
        ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
      }else if(isNext&&playerProfile&&playerProfile.talentPoints>0){
        ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fill();
        ctx.strokeStyle=td.color;ctx.lineWidth=2;
        ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
        // Pulsing glow
        ctx.shadowColor=td.color;ctx.shadowBlur=8+Math.sin(titleGlow*3)*4;
        ctx.stroke();ctx.shadowBlur=0;
      }else{
        ctx.fillStyle='rgba(30,30,30,0.8)';ctx.fill();
        ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.stroke();
      }

      // Level number
      drawNeonText(`${l+1}`,cx+colW/2,ny+nodeR,filled?'#fff':'#555',12);

      // Click to upgrade
      if(isNext&&playerProfile&&playerProfile.talentPoints>0){
        const dx=mouseX-(cx+colW/2),dy=mouseY-(ny+nodeR);
        if(dx*dx+dy*dy<nodeR*nodeR+100){
          // Hover tooltip
          drawNeonText('CLICK TO UPGRADE',cx+colW/2,ny+nodeR+25,td.color,9);
          if(mouseClicked){
            if(spendTalentPoint(cid,td.key)){snd(800,.1,'sine',.08);snd(1000,.08,'sine',.05)}
          }
        }
      }
    }

    // Effect description
    drawNeonText(td.desc,cx+colW/2,colStartY+colH-20,'#888',10);
    drawNeonText(`Level: ${lvl}/5`,cx+colW/2,colStartY+colH-6,lvl>0?td.color:'#555',10);
  }

  // Back button
  if(drawButton(W/2-60,H-45,120,35,'BACK','#fff',16)){gameState='title'}

  titleGlow+=.03;
}

// Campaign state
let campCharId=0;      // player's character index for campaign
let campStage=0;       // current stage (0-19)
let campProgress={};   // {charId: highestStageCleared} loaded from localStorage
let campState='';      // 'map','dialogue','fight','victory','complete'
let campDialogue=[];   // current dialogue lines
let campDialogueIdx=0; // current line index
let campDialogueChar=0;// typewriter char position
let campDialogueTick=0;
let campWon=false;
let campPointAwarded=false;

function loadCampaignProgress(){
  campProgress=lsLoad(LS_CAMPAIGN,{})||{};
}
function saveCampaignProgress(){
  lsSave(LS_CAMPAIGN,campProgress);
}
function getCampStageForChar(cid){return campProgress[cid]||0}

function drawCampaignSelect(){
  if(!bgCanvas)buildBg();ctx.drawImage(bgCanvas,0,0);drawDynBg();
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
  drawNeonText('CAMPAIGN',W/2,40,'#f80',34);
  drawNeonText('Select your fighter',W/2,70,'#888',16);

  // Character grid (reuse charIds)
  const cols=3,cardW=140,cardH=180,gapX=15,gapY=10;
  const totalCW=cols*cardW+(cols-1)*gapX;
  const startX=(W-totalCW)/2,startY=90;

  for(let i=0;i<charIds.length;i++){
    const col=i%cols,row=Math.floor(i/cols);
    const cx=startX+col*(cardW+gapX)+cardW/2;
    const cy=startY+row*(cardH+gapY)+cardH/2;
    const cd=CHARACTERS[charIds[i]];
    const sel=csP1===i;
    const progress=getCampStageForChar(charIds[i]);

    ctx.fillStyle=sel?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.4)';
    ctx.fillRect(cx-cardW/2,cy-cardH/2,cardW,cardH);
    if(sel){ctx.strokeStyle='#f80';ctx.shadowColor='#f80';ctx.shadowBlur=15;ctx.lineWidth=2;ctx.strokeRect(cx-cardW/2,cy-cardH/2,cardW,cardH);ctx.shadowBlur=0}
    else{ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(cx-cardW/2,cy-cardH/2,cardW,cardH)}

    drawPreview(cx,cy-15,charIds[i],titleGlow*30);
    drawNeonText(cd.name,cx,cy+55,cd.color,18);
    // Progress bar
    const pct=progress/20;
    ctx.fillStyle='#222';ctx.fillRect(cx-40,cy+68,80,8);
    ctx.fillStyle=progress>=20?'#0f0':'#f80';ctx.fillRect(cx-40,cy+68,80*pct,8);
    drawNeonText(progress>=20?'COMPLETE':`Stage ${progress}/20`,cx,cy+85,progress>=20?'#0f0':'#888',9);
  }

  // Input
  if(keyJustPressed('KeyA')||keyJustPressed('ArrowLeft')){csP1=(csP1+charIds.length-1)%charIds.length;menuSound()}
  if(keyJustPressed('KeyD')||keyJustPressed('ArrowRight')){csP1=(csP1+1)%charIds.length;menuSound()}
  if(keyJustPressed('KeyW')||keyJustPressed('ArrowUp')){csP1=(csP1-3+charIds.length)%charIds.length;menuSound()}
  if(keyJustPressed('KeyS')||keyJustPressed('ArrowDown')){csP1=(csP1+3)%charIds.length;menuSound()}
  if(keyJustPressed('Enter')||keyJustPressed('Space')||keyJustPressed('KeyJ')){
    campCharId=csP1;campStage=getCampStageForChar(charIds[csP1]);
    if(campStage>=20)campStage=0;// replay
    gameState='campaignMap';menuSound();loadCampaignProgress();
  }
  if(keyJustPressed('Escape')){gameState='modeSelect';menuSel=0;menuSound()}

  if(drawButton(W/2-60,H-40,120,30,'BACK','#888',14)){gameState='modeSelect';menuSel=0}
  titleGlow+=.03;
}

// Scroll state
let campScrollX=0,campPlayerX=200,campLevelW=4000,campEncIdx=-1,campScrollLocked=false;
let campEnemies=[],campEnemyAIs=[],campChapter=0,campEncCleared=0,campPlayerHP=100,campPlayerMaxHP=100;

// Build encounter data per chapter: each chapter has 5 regular + 1 boss = 6 encounters
function getCampEncounters(ch){
  const baseStages=CAMPAIGN_STAGES.filter(s=>s.ch===ch);
  const encs=[];
  let xPos=600;
  for(let i=0;i<baseStages.length;i++){
    const s=baseStages[i];
    // Bosses get more space before them
    if(s.boss)xPos+=300;
    encs.push({x:xPos,stage:s,defeated:false});
    xPos+=500+Math.random()*200;
  }
  campLevelW=xPos+400;
  return encs;
}
let campEncounters=[];

function drawCampaignMap(){
  // Simplified chapter select
  if(!bgCanvas)buildBg();ctx.drawImage(bgCanvas,0,0);drawDynBg();
  ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,H);
  drawNeonText('CAMPAIGN',W/2,30,'#f80',30);
  const cid=charIds[campCharId];
  drawNeonText(CHARACTERS[cid].name,W/2,58,CHARACTERS[cid].color,16);

  // Chapter buttons
  for(let ch=0;ch<5;ch++){
    const chData=CHAPTERS[ch];
    const y=100+ch*75;
    const chStart=ch*4;
    const unlocked=campStage>=chStart;
    const cleared=campStage>=(ch+1)*4;

    ctx.fillStyle=unlocked?'rgba(0,0,0,0.4)':'rgba(0,0,0,0.6)';
    ctx.fillRect(W/2-250,y,500,60);
    ctx.strokeStyle=unlocked?(cleared?'#0f0':chData.color):'#333';ctx.lineWidth=unlocked?2:1;
    ctx.strokeRect(W/2-250,y,500,60);
    ctx.globalAlpha=unlocked?1:.3;
    drawNeonText(`CH${ch+1}: ${chData.name}`,W/2,y+20,cleared?'#0f0':chData.color,18);
    drawNeonText(chData.desc,W/2,y+42,'#888',10);
    if(cleared)drawNeonText('CLEARED',W/2+200,y+20,'#0f0',12);
    ctx.globalAlpha=1;

    if(unlocked&&!cleared&&mouseClicked&&mouseX>=W/2-250&&mouseX<=W/2+250&&mouseY>=y&&mouseY<=y+60){
      campChapter=ch;
      // Start chapter with intro dialogue
      const firstStage=CAMPAIGN_STAGES.find(s=>s.ch===ch);
      campDialogue=firstStage.pre;campDialogueIdx=0;campDialogueChar=0;campDialogueTick=0;
      campState='pre';gameState='dialogue';menuSound();
    }
  }

  if(drawButton(W/2-60,H-40,120,30,'BACK','#888',14))gameState='campaignSelect';
  titleGlow+=.03;
}

function drawDialogue(){
  if(!bgCanvas)buildBg();ctx.drawImage(bgCanvas,0,0);drawDynBg();
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,H);

  const line=campDialogue[campDialogueIdx];
  if(!line){
    if(campState==='pre'){startCampaignScroll();return}
    if(campState==='post'){
      if(campWon){
        campStage++;campProgress[charIds[campCharId]]=Math.max(campProgress[charIds[campCharId]]||0,campStage);saveCampaignProgress();
        if(!campPointAwarded&&currentUser&&playerProfile){campPointAwarded=true;awardWin(charIds[campCharId],true)}
        if(campStage>=20){gameState='campaignComplete';return}
      }
      gameState='campaignMap';return;
    }
    gameState='campaignMap';return;
  }

  const stage=CAMPAIGN_STAGES[Math.min(campStage,19)];
  drawNeonText(`Chapter ${stage.ch+1}: ${CHAPTERS[stage.ch].name}`,W/2,40,CHAPTERS[stage.ch].color,18);
  if(campState==='pre')drawNeonText(`${stage.ename}${stage.boss?' [BOSS]':''}`,W/2,70,stage.boss?'#f44':'#fff',20);

  // Dialogue box
  ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(40,H-170,W-80,140);
  ctx.strokeStyle='#555';ctx.lineWidth=2;ctx.strokeRect(40,H-170,W-80,140);
  const isPlayer=line.s==='PLAYER';
  const speakerCol=isPlayer?CHARACTERS[charIds[campCharId]].color:(stage.boss?'#f44':stage.ecol);
  const speakerName=isPlayer?CHARACTERS[charIds[campCharId]].name:line.s;
  ctx.fillStyle=isPlayer?'rgba(0,100,150,0.2)':'rgba(150,50,50,0.2)';
  ctx.fillRect(50,H-162,80,80);ctx.strokeStyle=speakerCol;ctx.lineWidth=1;ctx.strokeRect(50,H-162,80,80);
  ctx.fillStyle=isPlayer?CHARACTERS[charIds[campCharId]].skinColor:'#999';
  ctx.beginPath();ctx.arc(90,H-130,20,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=speakerCol;ctx.globalAlpha=.5;ctx.fillRect(78,H-135,6,4);ctx.fillRect(96,H-135,6,4);ctx.globalAlpha=1;
  drawNeonText(speakerName,145,H-150,speakerCol,16,'left');
  campDialogueTick++;
  if(campDialogueTick%2===0&&campDialogueChar<line.t.length)campDialogueChar++;
  const visText=line.t.substring(0,campDialogueChar);
  ctx.font='14px monospace';ctx.fillStyle='#ccc';ctx.textAlign='left';ctx.textBaseline='top';
  const maxWd=W-200;const words=visText.split(' ');let cLine='',ly=H-130;
  for(const w of words){const test=cLine+w+' ';if(ctx.measureText(test).width>maxWd&&cLine){ctx.fillText(cLine,145,ly);ly+=20;cLine=w+' '}else cLine=test}
  ctx.fillText(cLine,145,ly);
  if(campDialogueChar>=line.t.length){const blink=Math.sin(Date.now()/300)>0;if(blink)drawNeonText('ENTER to continue',W/2,H-20,'#888',11)}
  if(keyJustPressed('Enter')||keyJustPressed('Space')||keyJustPressed('KeyJ')){
    if(campDialogueChar<line.t.length)campDialogueChar=line.t.length;
    else{campDialogueIdx++;campDialogueChar=0;campDialogueTick=0}
  }
}

function startCampaignScroll(){
  campEncounters=getCampEncounters(campChapter);
  campScrollX=0;campPlayerX=200;campEncIdx=-1;campScrollLocked=false;
  campEnemies=[];campEnemyAIs=[];campEncCleared=0;
  campWon=false;campPointAwarded=false;

  const f1=new Fighter(charIds[campCharId],200,1,P1C);
  applyTalents(f1,charIds[campCharId]);
  fighters=[f1];
  campPlayerHP=f1.maxHp;campPlayerMaxHP=f1.maxHp;

  gameState='campaignScroll';
  projectiles.length=0;particles.length=0;clearBlood();
  roundMsg=`CH${campChapter+1}: ${CHAPTERS[campChapter].name}`;roundMsgTimer=90;
}

function drawScrollBg(sx){
  // Parallax layers
  const farOff=sx*.15,midOff=sx*.4;
  // Sky
  ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);
  // Far buildings
  ctx.fillStyle='#0a0618';
  for(let x=-farOff%120-120;x<W+120;x+=120){
    const h=80+Math.sin(x*.02+1)*40;
    ctx.fillRect(x,GROUND-h,55,h);
    ctx.fillRect(x+60,GROUND-h+20,50,h-20);
  }
  // Mid buildings
  ctx.fillStyle='#12081e';
  for(let x=-midOff%100-100;x<W+100;x+=100){
    const h=100+Math.sin(x*.03+2)*50;
    ctx.fillRect(x,GROUND-h,65,h);
    // Windows
    ctx.fillStyle='rgba(0,255,255,0.1)';
    for(let wy=GROUND-h+8;wy<GROUND-10;wy+=14)for(let wx=x+8;wx<x+57;wx+=12)if(Math.random()>.6)ctx.fillRect(wx,wy,4,6);
    ctx.fillStyle='#12081e';
  }
  // Neon signs
  const signOff=sx*.4;
  for(let x=-signOff%400;x<W+200;x+=400){
    ctx.fillStyle='rgba(255,0,255,0.08)';ctx.fillRect(x+50,GROUND-140,40,15);
    ctx.fillStyle='rgba(0,255,255,0.08)';ctx.fillRect(x+200,GROUND-120,50,15);
  }
  // Ground
  ctx.fillStyle='#1a0e2a';ctx.fillRect(0,GROUND,W,H-GROUND);
  // Ground line
  ctx.strokeStyle='rgba(0,255,255,0.5)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,GROUND);ctx.lineTo(W,GROUND);ctx.stroke();
  // Ground grid
  ctx.strokeStyle='rgba(0,255,255,0.04)';ctx.lineWidth=1;
  const gridOff=sx%50;
  for(let gx=-gridOff;gx<W+50;gx+=50){ctx.beginPath();ctx.moveTo(gx,GROUND);ctx.lineTo(gx+(gx-W/2)*.5,H);ctx.stroke()}
}

function drawCampaignScroll(){
  checkPause();
  const f1=fighters[0];
  if(!f1)return;

  // Update logic (skip if paused)
  if(!paused){
    // Round message countdown
    if(roundMsgTimer>0)roundMsgTimer--;

    // Player walking (when not in combat)
    if(!campScrollLocked){
      if(keyPressed('KeyD')){
        campPlayerX+=3.5;
        f1.state='walk';f1.animFrame++;
      }else{
        f1.state='idle';f1.animFrame++;
      }
      f1.facing=1;
      // Camera follows player
      campScrollX=Math.max(0,Math.min(campLevelW-W,campPlayerX-250));
      f1.x=campPlayerX-campScrollX;

      // Check encounter triggers
      for(let i=0;i<campEncounters.length;i++){
        if(!campEncounters[i].defeated&&campPlayerX>=campEncounters[i].x-100&&campPlayerX<=campEncounters[i].x+100){
          // Trigger encounter
          campEncIdx=i;campScrollLocked=true;
          const enc=campEncounters[i];
          const s=enc.stage;
          // Spawn enemy
          const f2=new Fighter(s.enemy,f1.x+350,-1,P2C);
          f2.data={...f2.data,name:s.ename};f2.data.color=s.ecol;
          f2.maxHp=s.hp;f2.hp=s.hp;f2.isAI=true;
          fighters[1]=f2;
          campEnemyAIs=[new AI(f2,s.ai)];
          roundMsg=s.boss?`BOSS: ${s.ename}`:`VS ${s.ename}`;roundMsgTimer=60;
          if(s.boss)snd(200,.3,'square',.1);
          break;
        }
      }

      // Check level end
      if(campPlayerX>=campLevelW-100){
        // Chapter complete
        campWon=true;
        const lastStage=CAMPAIGN_STAGES.filter(s=>s.ch===campChapter).pop();
        campStage=Math.max(campStage,(campChapter+1)*4);
        campDialogue=lastStage.post;campDialogueIdx=0;campDialogueChar=0;campDialogueTick=0;
        campState='post';gameState='dialogue';
        return;
      }
    }else{
      // In combat
      f1.animFrame++;
      const f2=fighters[1];
      if(f2){
        // Fight update
        if(campEnemyAIs[0])campEnemyAIs[0].update(f1);
        f1.update(f2);f2.update(f1);
        updateProjectiles(fighters);

        // Push apart
        const ov=50-Math.abs(f1.x-f2.x);
        if(ov>0&&f1.state!=='ko'&&f2.state!=='ko'){const p=ov/2;if(f1.x<f2.x){f1.x-=p;f2.x+=p}else{f1.x+=p;f2.x-=p}}

        // Clamp to screen
        f1.x=Math.max(30,Math.min(W-30,f1.x));
        f2.x=Math.max(30,Math.min(W-30,f2.x));

        // Enemy defeated
        if(f2.state==='ko'&&f2.stateTimer<=0){
          campEncounters[campEncIdx].defeated=true;campEncCleared++;
          campScrollLocked=false;
          campPlayerX=campScrollX+f1.x;// sync world pos
          fighters.length=1;campEnemyAIs=[];
          // Small heal
          f1.hp=Math.min(f1.maxHp,f1.hp+10);
          // Auto-save
          if(currentUser)saveCampaignProgress();
          // Award point
          if(currentUser&&playerProfile){awardWin(charIds[campCharId],true)}
          snd(600,.15,'sine',.06);
        }

        // Player defeated
        if(f1.state==='ko'&&f1.stateTimer<=0){
          campWon=false;
          campDialogue=[{s:'???',t:'You were defeated...'},{s:'PLAYER',t:'I\'ll be back.'}];
          campDialogueIdx=0;campDialogueChar=0;campDialogueTick=0;
          campState='post';gameState='dialogue';
          return;
        }
      }
    }
    updateBlood();updateParticles();
  }

  // ─── RENDER ───
  drawScrollBg(campScrollX);
  drawRain();
  drawBloodPools();drawBloodTrails();drawBloodMist();

  // Draw fighters
  f1.draw();
  if(fighters[1])fighters[1].draw();
  drawBloodDrops();drawProjectiles();drawParticles();

  // HUD
  const chData=CHAPTERS[campChapter];
  drawNeonText(`CH${campChapter+1}: ${chData.name}`,W/2,15,chData.color,14);

  // Player HP bar
  const hpRatio=f1.hp/f1.maxHp;
  ctx.fillStyle='#111';ctx.fillRect(25,35,300,20);ctx.fillStyle='#300';ctx.fillRect(27,37,296,16);
  const hpGrad=ctx.createLinearGradient(27,0,27+296*hpRatio,0);hpGrad.addColorStop(0,CHARACTERS[charIds[campCharId]].color);hpGrad.addColorStop(1,CHARACTERS[charIds[campCharId]].color2);
  ctx.fillStyle=hpGrad;ctx.fillRect(27,37,296*hpRatio,16);
  ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.strokeRect(25,35,300,20);
  drawNeonText(`${Math.ceil(f1.hp)}/${f1.maxHp}`,175,45,'#fff',10);
  drawNeonText(CHARACTERS[charIds[campCharId]].name,28,45,CHARACTERS[charIds[campCharId]].color,10,'left');

  // Enemy HP bar (if in combat)
  if(campScrollLocked&&fighters[1]&&fighters[1].state!=='ko'){
    const e=fighters[1];const eRatio=e.hp/e.maxHp;
    ctx.fillStyle='#111';ctx.fillRect(W-325,35,300,20);ctx.fillStyle='#300';ctx.fillRect(W-323,37,296,16);
    ctx.fillStyle=campEncounters[campEncIdx].stage.boss?'#f44':'#f80';
    ctx.fillRect(W-323+296*(1-eRatio),37,296*eRatio,16);
    ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.strokeRect(W-325,35,300,20);
    drawNeonText(e.data.name,W-28,45,e.data.color,10,'right');
    if(campEncounters[campEncIdx].stage.boss)drawNeonText('BOSS',W-170,25,'#f44',12);
  }

  // Progress bar at bottom
  const progPct=campPlayerX/campLevelW;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(100,H-15,W-200,8);
  ctx.fillStyle=chData.color;ctx.fillRect(100,H-15,(W-200)*progPct,8);

function spawnSurvivalEnemy(){
  const enemyChars=['vex','kai','raze','ghost','kira','titan'];
  const eid=enemyChars[survWave%enemyChars.length];
  const f2=new Fighter(eid,W-250,-1,P2C);
  const hp=80+survWave*8;
  const ai=Math.min(.9,.3+survWave*.03);
  const dmgBonus=Math.floor(survWave/3);
  f2.maxHp=hp;f2.hp=hp;f2.isAI=true;
  // Boost enemy damage for higher waves
  f2.data={...f2.data,name:`WAVE ${survWave}`};
  for(const ak of Object.keys(f2.data.attacks))f2.data.attacks[ak]={...f2.data.attacks[ak],damage:f2.data.attacks[ak].damage+dmgBonus};
  fighters[1]=f2;
  aiCtrl=new AI(f2,ai);
  roundMsg=survWave%5===0?`BOSS WAVE ${survWave}!`:`WAVE ${survWave}`;
  roundMsgTimer=60;roundTimer=ROUND_TIME;roundTimerTick=0;roundNum=1;
  fighters[0].wins=0;fighters[1].wins=0;
  // Boss waves: even more HP
  if(survWave%5===0){f2.maxHp=hp+60;f2.hp=f2.maxHp;f2.data.name=`BOSS W${survWave}`}
}

function drawSurvivalFight(){
  drawFight();

  // Survival HUD overlay
  drawNeonText(`WAVE: ${survWave}`,W/2,95,'#f44',14);
  drawNeonText(`KILLS: ${survKills}`,W/2-180,95,'#ff0',12);
  if(playerProfile){const best=playerProfile.survivalBest||0;drawNeonText(`BEST: W${best}`,W/2+180,95,'#888',12)}

  if(gameState==='gameOver'){
    const p1won=fighters[0].wins>=ROUNDS_TO_WIN;
    if(p1won){
      // Won this wave — heal slightly, next wave
      survKills++;survWave++;
      fighters[0].hp=Math.min(fighters[0].maxHp,fighters[0].hp+15);// small heal
      fighters[0].wins=0;fighters[0].reset(250);fighters[0].hp=Math.min(fighters[0].maxHp,fighters[0].hp+15);
      spawnSurvivalEnemy();
      gameState='survivalFight';
      projectiles.length=0;particles.length=0;
    }else{
      // Defeated — survival over
      gameState='survivalOver';
      if(currentUser&&playerProfile){
        playerProfile.survivalBest=Math.max(playerProfile.survivalBest||0,survWave-1);
        const tp=Math.floor((survWave-1)/3);// 1 talent point per 3 waves
        if(tp>0)playerProfile.talentPoints=(playerProfile.talentPoints||0)+tp;
        saveProfile();
      }
      survActive=false;
    }
  }
}

function applyTalents(fighter,charId){
  if(!currentUser||!playerProfile)return;
  const t=getTalents(charId);
  if(!t)return;
  // HP
  fighter.maxHp+=t.hp*5;fighter.hp=fighter.maxHp;
  // Damage
  for(const ak of Object.keys(fighter.data.attacks)){
    fighter.data.attacks[ak]={...fighter.data.attacks[ak],damage:fighter.data.attacks[ak].damage+t.damage};
  }
  // Speed
  fighter.data={...fighter.data,walkSpeed:fighter.data.walkSpeed+t.speed*0.3};
  // Special damage
  if(fighter.data.specialDamage)fighter.data.specialDamage+=t.special*2;
  // Defense stored on fighter
  fighter.defenseBonus=(t.defense||0)*0.02;// 2% per level
}

function startFight(){
  const f1=new Fighter(charIds[csP1],250,1,P1C);
  const f2=new Fighter(charIds[csP2],W-250,-1,P2C);
  fighters=[f1,f2];
  // Apply P1 talents
  applyTalents(f1,charIds[csP1]);
  if(isCPU){f2.isAI=true;aiCtrl=new AI(f2,.45)}
  roundNum=1;roundTimer=ROUND_TIME;roundTimerTick=0;winAwarded=false;
  gameState='fight';roundMsg=`ROUND ${roundNum}`;roundMsgTimer=90;
  projectiles.length=0;particles.length=0;clearBlood();
}
function startNewRound(){
  fighters[0].reset(250);fighters[1].reset(W-250);
  roundTimer=ROUND_TIME;roundTimerTick=0;roundNum++;
  roundMsg=`ROUND ${roundNum}`;roundMsgTimer=90;
  projectiles.length=0;particles.length=0;
  bloodDrops.length=0;bloodSplatters.length=0;screenBlood.length=0;bloodTrails.length=0;bloodMist.length=0;
  if(aiCtrl)aiCtrl.diff=Math.min(.8,aiCtrl.diff+.1);
}

function drawFight(){
  checkPause();
  if(!bgCanvas)buildBg();ctx.drawImage(bgCanvas,0,0);drawRain();drawDynBg();
  drawBloodPools();drawBloodTrails();
  const f1=fighters[0],f2=fighters[1];
  if(!paused&&roundMsgTimer>0){roundMsgTimer--;if(roundMsgTimer===50){roundMsg='FIGHT!';snd(500,.2,'square',.1)}}
  const fighting=roundMsgTimer<=50;
  if(!paused&&fighting&&hitstopFrames<=0){
    roundTimerTick++;if(roundTimerTick>=60){roundTimerTick=0;roundTimer=Math.max(0,roundTimer-1)}
    if(f2.isAI)aiCtrl.update(f1);f1.update(f2);f2.update(f1);
    updateProjectiles(fighters);updateBlood();
    const ov=50-Math.abs(f1.x-f2.x);
    if(ov>0&&f1.state!=='ko'&&f2.state!=='ko'){const p=ov/2;if(f1.x<f2.x){f1.x-=p;f2.x+=p}else{f1.x+=p;f2.x-=p}}
    const f1ko=f1.state==='ko'&&f1.stateTimer<=0,f2ko=f2.state==='ko'&&f2.stateTimer<=0;
    if(f1ko&&f2ko){startNewRound()}// double KO draw - no one gets a win
    else if(f1ko){f2.wins++;if(f2.wins>=ROUNDS_TO_WIN){gameState='gameOver';roundMsg=`${f2.data.name} WINS!`;roundMsgTimer=999}else startNewRound()}
    else if(f2ko){f1.wins++;if(f1.wins>=ROUNDS_TO_WIN){gameState='gameOver';roundMsg=`${f1.data.name} WINS!`;roundMsgTimer=999}else startNewRound()}
    else if(roundTimer<=0&&f1.state!=='ko'&&f2.state!=='ko'){if(f1.hp>f2.hp){f2.hp=0;f2.state='ko';f2.stateTimer=150}else if(f2.hp>f1.hp){f1.hp=0;f1.state='ko';f1.stateTimer=150}else{f1.hp=0;f1.state='ko';f1.stateTimer=150;f2.hp=0;f2.state='ko';f2.stateTimer=150}koSound();triggerShake(8)}
  }else{if(!paused&&hitstopFrames>0)hitstopFrames--;if(!paused)updateBlood()}
  if(!paused)updateParticles();
  drawProjectiles();drawWallSplatters();drawBloodMist();
  f1.draw();f2.draw();drawBloodDrops();drawParticles();drawHUD();drawScreenBlood();
  if(paused)drawPauseMenu();
}

  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);

  const winner=fighters[0].wins>=ROUNDS_TO_WIN?fighters[0]:fighters[1];
  const loser=winner===fighters[0]?fighters[1]:fighters[0];
  const pulse=Math.sin(Date.now()/200)*5+30;

  drawNeonText(winner.data.name,W/2,H/2-70,winner.data.color,58);
  drawNeonText('WINS!',W/2,H/2-10,'#ff0',46);
  if(loser.hp<=0&&winner.hp>60)drawNeonText('FLAWLESS DOMINATION',W/2,H/2+30,'#cc0000',22);
  else if(loser.hp<=0&&winner.hp>30)drawNeonText('BRUTAL FINISH',W/2,H/2+30,'#cc0000',22);
  else drawNeonText('K.O.',W/2,H/2+30,'#aa0000',22);
  ctx.shadowBlur=0;
  drawNeonText(`${fighters[0].wins} - ${fighters[1].wins}`,W/2,H/2+60,'#fff',24);
  // Blood counter
  drawNeonText(`BLOOD SPILLED: ${Math.floor(totalBloodSpilled)}`,W/2,H/2+85,'#800',12);
  // Award talent point on first visit to game over (winner already defined above)
  if(!winAwarded&&currentUser&&playerProfile){
    winAwarded=true;
    if(winner===fighters[0]){awardWin(charIds[csP1]);drawNeonText('+1 TALENT POINT!',W/2,H/2+95,'#0f0',16)}
    else{recordLoss()}
  }else if(winAwarded&&winner===fighters[0]&&currentUser){
    drawNeonText('+1 TALENT POINT!',W/2,H/2+95,'#0f0',16);
  }
  const blink=Math.sin(Date.now()/350)>0;if(blink)drawNeonText('PRESS ENTER TO PLAY AGAIN',W/2,H/2+120,'#aaa',18);
  drawScreenBlood();
  if(keyJustPressed('Enter')||keyJustPressed('Space')){gameState='title';fighters=[];projectiles.length=0;particles.length=0;clearBlood();menuSound()}
}

// ─── Main Loop ───
function gameLoop(){
  if(shakeMag>.5){shakeX=(Math.random()-.5)*shakeMag;shakeY=(Math.random()-.5)*shakeMag;shakeMag*=.85}
  else{shakeX=0;shakeY=0;shakeMag=0}
  ctx.save();ctx.translate(shakeX,shakeY);ctx.clearRect(-10,-10,W+20,H+20);
  switch(gameState){case'title':drawTitle();break;case'modeSelect':drawModeSelect();break;case'charSelect':drawCharSelect();break;case'fight':drawFight();break;case'gameOver':drawGameOver();break;case'talentTree':drawTalentTree();break;case'campaignSelect':drawCampaignSelect();break;case'campaignMap':drawCampaignMap();break;case'dialogue':drawDialogue();break;case'campaignScroll':drawCampaignScroll();break;case'campaignComplete':drawCampaignComplete();break;case'leaderboard':drawLeaderboard();break;case'survivalSelect':drawSurvivalSelect();break;case'survivalFight':drawSurvivalFight();break;case'survivalOver':drawSurvivalOver();break}
  ctx.restore();
  ctx.fillStyle='rgba(0,0,0,0.03)';for(let y=0;y<H;y+=3)ctx.fillRect(0,y,W,1);
  const vig=ctx.createRadialGradient(W/2,H/2,W*.3,W/2,H/2,W*.7);vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.5)');ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  // Red tint scales with carnage
  const carnage=Math.min(.2,(bloodDrops.length+screenBlood.length*10+bloodPools.length*.5+totalBloodSpilled*.001)*.003);
  if(carnage>.01){ctx.fillStyle=`rgba(80,0,0,${carnage})`;ctx.fillRect(0,0,W,H)}
  // Blood rain when extreme carnage
  if(totalBloodSpilled>500&&gameState==='fight'){
    for(const r of rain){if(Math.random()>.95)r.opacity=.15;
      if(Math.random()>.98){ctx.globalAlpha=.08;ctx.strokeStyle='#880000';ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x+1,r.y+r.len);ctx.stroke();ctx.globalAlpha=1}}}
  mouseClicked=false;clearJustPressed();requestAnimationFrame(gameLoop);
}
buildBg();gameLoop();
</script>
